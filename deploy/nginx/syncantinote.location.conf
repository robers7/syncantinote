# Include this file inside each existing server block for feisio.com and feisio.co.uk.
# It handles scoped paths for Syncantinote and Feisiomark, avoiding global app impact.

location = /syncantinote {
    return 302 /syncantinote/;
}

location = /syncantinote/install.command {
    return 302 /syncantinote/SyncantinoteInstaller.zip;
}

location = /syncantinote/raw-install.command {
    alias /srv/apps/syncantinote/installer/public/install.command;
    default_type text/plain;
    add_header Content-Disposition "attachment; filename=SyncantinoteInstaller.command";
}

location = /syncantinote/SyncantinoteInstaller.zip {
    alias /srv/apps/syncantinote/installer/public/SyncantinoteInstaller.zip;
    default_type application/zip;
    add_header Content-Disposition "attachment; filename=SyncantinoteInstaller.zip";
}

location /syncantinote/ {
    alias /srv/apps/syncantinote/installer/public/;
    index index.html;
    try_files $uri $uri/ /syncantinote/index.html;
}

location = /feisiomark {
    return 302 /feisiomark/;
}

location = /feisiomark/ {
    proxy_pass http://127.0.0.1:3177/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /feisiomark/api/ {
    proxy_pass http://127.0.0.1:3177/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /feisiomark/health {
    proxy_pass http://127.0.0.1:3177/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}

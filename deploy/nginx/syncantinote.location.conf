# Include this file inside each existing server block for feisio.com and feisio.co.uk.
# It only handles /feisiomark paths to avoid impacting other apps.

location /feisiomark/api/ {
    proxy_pass http://127.0.0.1:3177/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /feisiomark/health {
    proxy_pass http://127.0.0.1:3177/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
